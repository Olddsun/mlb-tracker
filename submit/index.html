<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>提交戰績 · E-Sport League</title>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a22;
    --border: #252c3a;
    --accent: #4f8ef7;
    --text: #dde3ef;
    --muted: #6b7896;
    --green: #3dba7a;
    --red: #e05c5c;
    --yellow: #e8c44b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }
  header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .back-btn {
    color: var(--accent); text-decoration: none;
    font-size: 15px; display: flex; align-items: center; gap: 4px;
  }
  header h1 { font-size: 17px; font-weight: 600; }

  .container { padding: 24px 20px 48px; max-width: 480px; margin: 0 auto; }

  /* Steps */
  .step { display: none; }
  .step.active { display: block; }

  .step-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .step-desc { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

  /* Form */
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .field { margin-bottom: 20px; }

  select, input[type=text], textarea {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 16px;
    padding: 13px 14px; outline: none; font-family: inherit;
  }
  select:focus, input:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: none; height: 80px; line-height: 1.5; }
  ::placeholder { color: var(--muted); }

  /* Player select */
  .player-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .player-btn {
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 12px; padding: 16px 8px; text-align: center;
    cursor: pointer; transition: all 0.15s; color: var(--text);
    font-size: 15px; font-weight: 600;
  }
  .player-btn.selected { border-color: var(--accent); background: rgba(79,142,247,0.12); color: var(--accent); }

  /* Images */
  .img-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 8px; }
  .img-slot {
    aspect-ratio: 9/16; background: var(--surface); border: 2px dashed var(--border);
    border-radius: 8px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.15s;
  }
  .img-slot:active { border-color: var(--accent); }
  .img-slot.filled { border-style: solid; border-color: var(--accent); }
  .img-slot img { width: 100%; height: 100%; object-fit: cover; }
  .img-slot .plus {
    font-size: 24px; color: var(--muted); pointer-events: none;
  }
  .img-slot .rm {
    position: absolute; top: 3px; right: 3px;
    width: 20px; height: 20px; background: rgba(0,0,0,0.7);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #fff; z-index: 1;
  }
  .img-hint { font-size: 12px; color: var(--muted); text-align: center; }
  input[type=file] { display: none; }

  /* Button */
  .btn {
    width: 100%; padding: 16px; border-radius: 12px; border: none;
    font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    margin-top: 24px;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-ghost { background: var(--surface); color: var(--text); }

  /* Processing */
  #step-processing { text-align: center; padding: 48px 0; }
  .spinner {
    width: 48px; height: 48px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 20px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .processing-msg { font-size: 15px; color: var(--muted); }

  /* Result */
  #step-result { text-align: center; padding-top: 24px; }
  .result-icon { font-size: 48px; margin-bottom: 16px; }
  .result-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .result-score {
    background: var(--surface); border-radius: 14px; padding: 20px;
    margin: 20px 0; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px;
  }
  .score-player { font-size: 13px; color: var(--muted); }
  .score-num { font-size: 36px; font-weight: 800; }
  .score-num.winner { color: var(--accent); }
  .score-vs { font-size: 13px; color: var(--muted); font-weight: 600; }
  .result-winner { font-size: 15px; color: var(--green); font-weight: 600; margin-bottom: 16px; }
  .warnings { text-align: left; }
  .warning-item {
    background: rgba(232,196,75,0.1); border: 1px solid rgba(232,196,75,0.3);
    border-radius: 8px; padding: 10px 12px; font-size: 13px;
    color: var(--yellow); margin-bottom: 8px;
  }
  .error-box {
    background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3);
    border-radius: 12px; padding: 16px; color: var(--red);
    font-size: 14px; margin: 16px 0; text-align: left;
  }
</style>
</head>
<body>
<header>
  <a href="/" class="back-btn">
    <svg width="8" height="14" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    返回
  </a>
  <h1>提交戰績紀錄</h1>
</header>

<div class="container">

  <!-- Step 1: 身份 -->
  <div class="step active" id="step-identity">
    <div class="step-title">你是誰？</div>
    <div class="step-desc">選擇提交者並輸入 token</div>

    <div class="field">
      <label>提交者</label>
      <div class="player-grid">
        <button class="player-btn" data-player="Scott" onclick="selectPlayer(this)">Scott</button>
        <button class="player-btn" data-player="Alvin" onclick="selectPlayer(this)">Alvin</button>
        <button class="player-btn" data-player="Vincent" onclick="selectPlayer(this)">Vincent</button>
      </div>
    </div>

    <div class="field">
      <label>Token</label>
      <input type="text" id="token-input" placeholder="輸入你的名字" autocomplete="off" autocorrect="off">
    </div>

    <button class="btn btn-primary" onclick="goToStep2()">下一步</button>
  </div>

  <!-- Step 2: 對戰資訊 -->
  <div class="step" id="step-match">
    <div class="step-title">這場怎麼打？</div>
    <div class="step-desc">輸入玩家與隊伍對應</div>

    <div class="field">
      <label>玩家隊伍對應</label>
      <textarea id="mapping-input" placeholder="例：Scott：洋基隊 / Alvin：道奇隊"></textarea>
    </div>

    <button class="btn btn-primary" onclick="goToStep3()">下一步</button>
    <button class="btn btn-ghost" onclick="showStep('step-identity')">上一步</button>
  </div>

  <!-- Step 3: 上傳截圖 -->
  <div class="step" id="step-upload">
    <div class="step-title">上傳 5 張截圖</div>
    <div class="step-desc">順序不限，AI 會自動判斷</div>

    <div class="img-grid" id="img-grid">
      <div class="img-slot" onclick="triggerFileInput(0)" id="slot-0"><span class="plus">+</span></div>
      <div class="img-slot" onclick="triggerFileInput(1)" id="slot-1"><span class="plus">+</span></div>
      <div class="img-slot" onclick="triggerFileInput(2)" id="slot-2"><span class="plus">+</span></div>
      <div class="img-slot" onclick="triggerFileInput(3)" id="slot-3"><span class="plus">+</span></div>
      <div class="img-slot" onclick="triggerFileInput(4)" id="slot-4"><span class="plus">+</span></div>
    </div>
    <p class="img-hint">點擊槽位選取截圖</p>

    <input type="file" id="file-input" accept="image/*">

    <button class="btn btn-primary" id="submit-btn" onclick="submitGame()" disabled>
      送出分析
    </button>
    <button class="btn btn-ghost" onclick="showStep('step-match')">上一步</button>
  </div>

  <!-- Processing -->
  <div class="step" id="step-processing">
    <div class="spinner"></div>
    <div class="processing-msg" id="processing-msg">上傳截圖中…</div>
  </div>

  <!-- Result -->
  <div class="step" id="step-result"></div>

</div>

<script>
let selectedPlayer = ''
let currentSlot = -1
const images = [null, null, null, null, null]

function selectPlayer(btn) {
  document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('selected'))
  btn.classList.add('selected')
  selectedPlayer = btn.dataset.player
  // 自動填入 token
  const tokenInput = document.getElementById('token-input')
  if (!tokenInput.value) tokenInput.value = selectedPlayer
}

function showStep(id) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  window.scrollTo(0, 0)
}

function goToStep2() {
  if (!selectedPlayer) return alert('請選擇提交者')
  const token = document.getElementById('token-input').value.trim()
  if (!token) return alert('請輸入 Token')
  showStep('step-match')
}

function goToStep3() {
  const mapping = document.getElementById('mapping-input').value.trim()
  if (!mapping) return alert('請輸入玩家隊伍對應')
  showStep('step-upload')
}

function triggerFileInput(index) {
  currentSlot = index
  const input = document.getElementById('file-input')
  input.value = ''
  input.click()
}

document.getElementById('file-input').addEventListener('change', async (e) => {
  const file = e.target.files[0]
  if (!file || currentSlot < 0) return

  const compressed = await compressImage(file)
  images[currentSlot] = compressed

  const slot = document.getElementById(`slot-${currentSlot}`)
  const url = URL.createObjectURL(compressed)
  slot.innerHTML = `
    <img src="${url}">
    <div class="rm" onclick="removeImage(event, ${currentSlot})">✕</div>
  `
  slot.classList.add('filled')
  updateSubmitBtn()
})

function removeImage(e, index) {
  e.stopPropagation()
  images[index] = null
  const slot = document.getElementById(`slot-${index}`)
  slot.innerHTML = '<span class="plus">+</span>'
  slot.classList.remove('filled')
  slot.onclick = () => triggerFileInput(index)
  updateSubmitBtn()
}

function updateSubmitBtn() {
  const btn = document.getElementById('submit-btn')
  btn.disabled = images.some(img => img === null)
}

async function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image()
    const url = URL.createObjectURL(file)
    img.onload = () => {
      const maxW = 1600
      let w = img.width, h = img.height
      if (w > maxW) { h = Math.round(h * maxW / w); w = maxW }
      const canvas = document.createElement('canvas')
      canvas.width = w; canvas.height = h
      canvas.getContext('2d').drawImage(img, 0, 0, w, h)
      canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.82)
      URL.revokeObjectURL(url)
    }
    img.src = url
  })
}

async function submitGame() {
  const token = document.getElementById('token-input').value.trim()
  const rawUserInput = document.getElementById('mapping-input').value.trim()

  showStep('step-processing')
  setMsg('建立上傳工作階段…')

  try {
    // 1. 建立 session
    const sessionRes = await fetch('/api/create-upload-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ submittedBy: selectedPlayer, token, rawUserInput }),
    })
    const session = await sessionRes.json()
    if (!sessionRes.ok) throw new Error(session.error || '建立 session 失敗')

    // 2. 上傳 5 張截圖
    setMsg('上傳截圖中…')
    for (let i = 0; i < 5; i++) {
      const urlInfo = session.uploadUrls[i]
      const uploadRes = await fetch(urlInfo.uploadUrl, {
        method: 'PUT',
        headers: { 'Content-Type': 'image/jpeg' },
        body: images[i],
      })
      if (!uploadRes.ok) throw new Error(`截圖 ${i + 1} 上傳失敗`)
      setMsg(`上傳截圖中… (${i + 1}/5)`)
    }

    // 3. AI 解析
    setMsg('AI 解析中，約需 15 秒…')
    const processRes = await fetch('/api/process-submission', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ submissionId: session.submissionId }),
    })
    const result = await processRes.json()

    if (!processRes.ok || !result.success) {
      throw new Error(result.error || '解析失敗')
    }

    showResult(result)
  } catch (err) {
    showError(err.message)
  }
}

function setMsg(msg) {
  document.getElementById('processing-msg').textContent = msg
}

function showResult(result) {
  showStep('step-result')
  const g = result.game
  const homeWon = g.winner === g.homePlayer
  const awayWon = g.winner === g.awayPlayer

  document.getElementById('step-result').innerHTML = `
    <div class="result-icon">🏆</div>
    <div class="result-title">比賽記錄成功！</div>
    <div class="result-winner">${g.winner} 獲勝</div>
    <div class="result-score">
      <div>
        <div class="score-player">${g.homePlayer}</div>
        <div class="score-team" style="font-size:12px;color:var(--muted)">${g.homeTeam}</div>
        <div class="score-num ${homeWon ? 'winner' : ''}">${g.homeScore}</div>
      </div>
      <div class="score-vs">VS</div>
      <div>
        <div class="score-player">${g.awayPlayer}</div>
        <div class="score-team" style="font-size:12px;color:var(--muted)">${g.awayTeam}</div>
        <div class="score-num ${awayWon ? 'winner' : ''}">${g.awayScore}</div>
      </div>
    </div>
    ${result.warnings?.length ? `
      <div class="warnings">
        ${result.warnings.map(w => `<div class="warning-item">⚠️ ${w}</div>`).join('')}
      </div>
    ` : ''}
    <button class="btn btn-primary" onclick="location.href='/'">回到主頁</button>
    <button class="btn btn-ghost" onclick="location.reload()">再記一場</button>
  `
}

function showError(msg) {
  showStep('step-result')
  document.getElementById('step-result').innerHTML = `
    <div class="result-icon">❌</div>
    <div class="result-title">提交失敗</div>
    <div class="error-box">${msg}</div>
    <button class="btn btn-primary" onclick="showStep('step-upload')">重新上傳</button>
    <button class="btn btn-ghost" onclick="location.href='/'">返回主頁</button>
  `
}
</script>
</body>
</html>
